name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Typecheck
        run: nix develop -c pnpm run check-types

      - name: Lint
        run: nix develop -c pnpm run lint

      - name: Format check
        run: nix develop -c pnpm run format:check

      - name: Build
        run: nix develop -c pnpm run compile

      - name: Test
        run: nix develop -c pnpm run test
